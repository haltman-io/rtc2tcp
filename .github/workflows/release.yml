name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write    # create the GitHub Release and attach assets
  id-token: write    # request OIDC token for cosign keyless signing

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X rtc2tcp/internal/config.Version=${VERSION#v} -X rtc2tcp/internal/config.Commit=${COMMIT}"

          pkg="rtc2tcp-${VERSION}-${GOOS}-${GOARCH}"
          mkdir -p "build/${pkg}" dist

          EXT=""
          if [ "${GOOS}" = "windows" ]; then EXT=".exe"; fi

          for cmd in rtc2tcp-broker rtc2tcp-peer; do
            go build -trimpath -ldflags "${LDFLAGS}" -o "build/${pkg}/${cmd}${EXT}" "./cmd/${cmd}"
          done

          # Each archive ships with README, SECURITY, PROTOCOL, CHANGELOG
          # and this file so an operator who downloaded a single tar.gz
          # has everything they need without cloning the repo.
          cp README.md SECURITY.md PROTOCOL.md CHANGELOG.md "build/${pkg}/"

          cd build
          if [ "${GOOS}" = "windows" ]; then
            archive="${pkg}.zip"
            (cd "${pkg}" && zip -q -r "../../dist/${archive}" .)
          else
            archive="${pkg}.tar.gz"
            tar -czf "../dist/${archive}" "${pkg}"
          fi
          cd ..

          # Per-archive checksum file so users can verify a single
          # download without downloading the whole SHA256SUMS.
          ( cd dist && sha256sum "${archive}" > "${archive}.sha256" )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate aggregate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # Exclude per-archive .sha256 files from the aggregate manifest
          # so the manifest is self-contained and does not reference
          # other signature files.
          find . -maxdepth 1 -type f ! -name '*.sha256' ! -name 'SHA256SUMS*' -printf '%f\n' | \
            sort | xargs -I{} sha256sum "{}" > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SHA256SUMS (keyless OIDC)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cosign sign-blob --yes \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
